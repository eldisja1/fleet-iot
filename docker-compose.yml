services:

  mqtt:
    image: eclipse-mosquitto:2
    container_name: fleet-mqtt
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/certs:/mosquitto/certs
    networks:
      - fleet-network
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: fleet-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fleet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  consumer:
    build: ./backend/consumer
    container_name: fleet-consumer
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: 8883
      MQTT_SUBSCRIBE_TOPIC: ${MQTT_SUBSCRIBE_TOPIC}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TLS_ENABLED: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL_MODE: disable
    networks:
      - fleet-network
    volumes:
      - ./mosquitto/certs:/app/certs
    restart: unless-stopped

  simulator:
    build: ./simulator
    container_name: fleet-simulator
    depends_on:
      mqtt:
        condition: service_started
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: 8883
      MQTT_BASE_TOPIC: ${MQTT_BASE_TOPIC}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_TLS_ENABLED: "true"
    networks:
      - fleet-network
    volumes:
      - ./mosquitto/certs:/app/certs
    restart: unless-stopped

  api:
    build: ./backend/api
    container_name: fleet-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      API_USERNAME: ${API_USERNAME}
      API_PASSWORD: ${API_PASSWORD}
    ports:
      - "8000:8000"
    networks:
      - fleet-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_API_USERNAME: ${API_USERNAME}
        NEXT_PUBLIC_API_PASSWORD: ${API_PASSWORD}
    container_name: fleet-frontend
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_USERNAME: ${API_USERNAME}
      NEXT_PUBLIC_API_PASSWORD: ${API_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - fleet-network

  prometheus:
    image: prom/prometheus
    container_name: fleet-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - fleet-network
    restart: unless-stopped

networks:
  fleet-network:
    driver: bridge

volumes:
  postgres-data: